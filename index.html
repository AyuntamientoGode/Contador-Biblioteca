<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Biblioteca Godelleta</title>
    <style>
        /* Estilos mejorados: Más grandes y legibles */
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f4f4f9; color: #333; margin: 0; padding: 10px; }
        
        .container { 
            max-width: 600px; /* Un poco más ancho */
            margin: 10px auto; 
            background: white; 
            padding: 30px; /* Más espacio interno */
            border-radius: 20px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.1); 
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .logo { height: 65px; } /* Logos un poco más grandes */

        h3 { 
            margin: 25px 0 15px; 
            color: #2c3e50; 
            border-left: 5px solid #3498db; 
            padding-left: 12px; 
            text-align: left; 
            font-size: 1.3rem;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        
        /* Botones mucho más grandes */
        .btn { 
            padding: 25px 10px; /* Aumentado el grosor */
            font-size: 1.1rem; /* Letra más grande */
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            transition: 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .btn:active { transform: scale(0.92); box-shadow: none; }

        /* Colores por secciones */
        .sec-visitas { background: #34495e; } 
        .sec-libros { background: #27ae60; }
        .sec-actividades { background: #e67e22; }
        
        /* Botón Deshacer: Más destacado para evitar errores */
        .btn-undo { 
            background: #95a5a6; 
            width: 100%; 
            margin-top: 25px; 
            padding: 20px;
            font-size: 1rem;
        }

        #status { 
            margin-top: 20px; 
            font-weight: bold; 
            color: #7f8c8d; 
            font-size: 1.1rem; 
            padding: 10px;
            background: #fdfdfd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="GodelletaLogo.png" class="logo" alt="Escudo">
        <img src="LogoBibliotecaGodelleta.png" class="logo" alt="Logo Biblioteca">
    </div>

    <h3>👥 Registro de Visitas</h3>
    <div class="grid">
        <button class="btn sec-visitas" onclick="enviar('HOMBRE')">HOMBRE</button>
        <button class="btn sec-visitas" onclick="enviar('MUJER')">MUJER</button>
        <button class="btn sec-visitas" onclick="enviar('NIÑO')">NIÑO</button>
        <button class="btn sec-visitas" onclick="enviar('NIÑA')">NIÑA</button>
    </div>

    <h3>📚 Préstamos por Idioma</h3>
    <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
        <button class="btn sec-libros" onclick="enviar('LIBRO-ESP')">ESP</button>
        <button class="btn sec-libros" onclick="enviar('LIBRO-VLC')">VAL</button>
        <button class="btn sec-libros" onclick="enviar('LIBRO-ENG')">ING</button>
    </div>

    <h3>🎭 Actividades Especiales</h3>
    <div class="grid">
        <button class="btn sec-actividades" onclick="enviar('CLUB-JUEVES')">Club Lectura</button>
        <button class="btn sec-actividades" onclick="enviar('CLUB-FOREIGN')">Lectura Extranjeros</button>
    </div>

    <button class="btn btn-undo" onclick="enviar('UNDO')">↩️ DESHACER ÚLTIMO ERROR</button>
    
    <div id="status">Esperando registro...</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz53Z00ntDFol9d9ykKUyutKw8ydYqqcs1c-wekUQO1txPcf4Ij1BS1e9HrScXOpfa_/exec";

    function enviar(tipo) {
        const status = document.getElementById('status');
        const colorOriginal = "#7f8c8d";
        
        status.innerText = "Procesando " + tipo + "...";
        status.style.color = "#3498db";
        
        fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ "tipo": tipo })
        })
        .then(() => {
            status.innerText = "✅ " + tipo + " guardado";
            status.style.color = "#27ae60";
            setTimeout(() => { 
                status.innerText = "Esperando registro..."; 
                status.style.color = colorOriginal; 
            }, 2000);
        })
        .catch(() => { 
            status.innerText = "❌ Error al guardar"; 
            status.style.color = "#c0392b"; 
        });
    }
</script>

</body>
</html>
